# =============================================================================
# Twin Validator — Tolerance Rules
# =============================================================================
# Each rule documents an INTENTIONAL behavior difference between the legacy
# and migrated code that the diff engine should not flag as a regression.
#
# CRITICAL: Every rule MUST have a `rationale` field. The audit report
# includes them verbatim. If you cannot articulate the why in one sentence,
# the rule does not belong here — fix the code instead.
#
# Rule kinds supported by the diff engine:
#   - regex_ignore        : ignore exact value, match by pattern only
#   - regex_match         : require value to match pattern (any specific)
#   - any_uuid            : value must be a valid UUID, content irrelevant
#   - any_iso_datetime    : value must parse as ISO 8601, content irrelevant
#   - ignore_order        : list elements compared as a set, not a sequence
#   - numeric_tolerance   : numeric equality within `epsilon`
#   - enum_value_remap    : map old value → new value before comparing
#   - field_optional      : missing field on either side is acceptable
#   - schema_relaxed      : extra fields on the new side are acceptable
# =============================================================================

rules:
  - path: "$.version"
    kind: regex_ignore
    pattern: ".*"
    rationale: "API version string intentionally changes from v1 to v2; not a behavioral regression"

  - path: "$.detail[*].msg"
    kind: regex_ignore
    pattern: ".*"
    rationale: "Pydantic v2 prepends 'Value error, ' to ValidationError messages; API contract is the status code (422), not the message text"

  - path: "$.detail[*].input"
    kind: field_optional
    rationale: "Pydantic v2 includes 'input' field in 422 detail; v1 did not — this is non-breaking extra info"

  - path: "$.detail[*].ctx"
    kind: field_optional
    rationale: "Pydantic v2 includes 'ctx' field in 422 detail; v1 did not — this is non-breaking extra info"

  - path: "$.detail[*].loc"
    kind: field_optional
    rationale: "Pydantic v2 reports loc at list level while v1 reports per-item path; validation behavior is identical, loc is informational"
